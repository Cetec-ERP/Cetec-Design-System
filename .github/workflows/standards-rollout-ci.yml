name: Standards Rollout CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-report:
    name: Validate and Doctor Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run required validation gate
        run: npm run validate

      - name: Run doctor report (non-blocking)
        continue-on-error: true
        run: npm run doctor
