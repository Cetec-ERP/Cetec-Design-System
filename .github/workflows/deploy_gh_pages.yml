name: Deploy Docs (Storybook + Playroom) to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.storybook/**'
      - '.playroom/**'
      - '.opencode/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - '.storybook/**'
      - '.playroom/**'
      - '.opencode/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Prevent concurrent deployments to avoid git conflicts
concurrency:
  group: pages-deploy-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation gate
        run: npm run validate

  # Deploy main branch to root of gh-pages
  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Panda CSS
        run: npm run prepare

      - name: Generate SVG Sprite
        run: npm run generate-sprite

      - name: Build Storybook
        run: npm run storybook:build
        env:
          GH_REPO: ${{ github.event.repository.name }}
          STORYBOOK_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Build Playroom
        run: npm run playroom:build
        env:
          PLAYROOM_BASE_PATH: /${{ github.event.repository.name }}/playroom/

      - name: Deploy to gh-pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: .
          keep_files: true # Preserve PR preview directories

      - name: Deploy Playroom to gh-pages (/playroom)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/playroom
          destination_dir: playroom
          keep_files: true

  # Deploy PR preview to /pr-<number>/ subdirectory
  deploy-pr-preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Panda CSS
        run: npm run prepare

      - name: Generate SVG Sprite
        run: npm run generate-sprite

      - name: Build Storybook
        run: npm run storybook:build
        env:
          GH_REPO: ${{ github.event.repository.name }}
          STORYBOOK_BASE_PATH: /${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

      - name: Build Playroom
        run: npm run playroom:build
        env:
          PLAYROOM_BASE_PATH: /${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/playroom/

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Deploy Playroom PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/playroom
          destination_dir: pr-${{ github.event.pull_request.number }}/playroom
          keep_files: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const previewUrl = `https://${owner}.github.io/${repoName}/pr-${prNumber}/`;
            const playroomUrl = `${previewUrl}playroom/`;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner,
              repo: repoName,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Storybook + Playroom Preview')
            );

            const body = `## 📚 Storybook + Playroom Preview

            Your preview is ready!

            **Storybook:** ${previewUrl}
            **Playroom:** ${playroomUrl}

            <sub>This preview will be automatically removed when the PR is closed.</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo: repoName,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }
