name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v2
        with:
          # Ensure that git uses your token with admin access to the repo
          token: ${{ secrets.ADMIN_TOKEN }}
      - name: Prepare repository
        run: git fetch --unshallow --tags

      - name: Use Node.js 20.x
        uses: actions/setup-node@v1
        with:
          node-version: 20.x

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: npm-deps-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-deps-${{ hashFiles('package-lock.json') }}

      - name: Resolve Release Mode
        id: release_mode
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const semverLabels = new Set(['major', 'minor', 'patch']);
            const stableReleaseLabel = 'release';
            const skipReleaseLabel = 'skip-release';
            const targetBranch = context.ref.replace('refs/heads/', '');
            const headCommitMessage = context.payload.head_commit?.message ?? '';
            const headCommitTitle = headCommitMessage.split('\n')[0] ?? '';

            const resolveMergedPr = async () => {
              const squashMergePrMatch = headCommitTitle.match(/\(#(\d+)\)\s*$/);

              if (squashMergePrMatch) {
                const pull_number = Number(squashMergePrMatch[1]);
                const { data: pullRequest } = await github.rest.pulls.get({
                  ...context.repo,
                  pull_number,
                });

                if (pullRequest.merged_at && pullRequest.base.ref === targetBranch) {
                  core.info(`Resolved PR #${pullRequest.number} from squash commit message.`);
                  return pullRequest;
                }

                core.info(
                  `PR #${pull_number} from squash commit message does not match merged target ${targetBranch}. Falling back to associated PR lookup.`,
                );
              }

              const { data: pullRequests } =
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  ...context.repo,
                  commit_sha: context.sha,
                });

              const mergedPr = pullRequests.find(
                (pr) => pr.merged_at && pr.base.ref === targetBranch,
              );

              if (mergedPr) {
                core.info(`Resolved PR #${mergedPr.number} from associated PR lookup.`);
              }

              return mergedPr;
            };

            const mergedPr = await resolveMergedPr();

            if (!mergedPr) {
              core.info('No merged PR found for this push. Skipping release.');
              core.setOutput('mode', 'skip');
              return;
            }

            const labels = mergedPr.labels.map((label) => label.name);
            const hasSemverLabel = labels.some((label) => semverLabels.has(label));
            const hasStableReleaseLabel = labels.includes(stableReleaseLabel);
            const hasSkipReleaseLabel = labels.includes(skipReleaseLabel);
            const semverLabel = labels.find((label) => semverLabels.has(label)) ?? '';

            core.info(
              `Resolved PR #${mergedPr.number} with labels: ${labels.join(', ') || '(none)'}`,
            );

            if (hasSkipReleaseLabel || !hasSemverLabel) {
              core.setOutput('mode', 'skip');
              return;
            }

            core.setOutput('mode', hasStableReleaseLabel ? 'latest' : 'next');
            core.setOutput('semver_label', semverLabel);

      - name: Resolve Publish Version
        if: steps.release_mode.outputs.mode != 'skip'
        id: publish_version
        uses: actions/github-script@v7
        env:
          RELEASE_MODE: ${{ steps.release_mode.outputs.mode }}
          RELEASE_SEMVER_LABEL: ${{ steps.release_mode.outputs.semver_label }}
        with:
          script: |
            const { readFileSync } = require('node:fs');
            const { execFileSync } = require('node:child_process');

            const releaseMode = process.env.RELEASE_MODE;
            const releaseSemverLabel = process.env.RELEASE_SEMVER_LABEL;
            const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
            const packageName = packageJson.name;
            const rawVersion = packageJson.version;

            const versionPattern =
              /^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)(?:-(?<prerelease>[0-9A-Za-z.-]+))?$/;

            const parseVersion = (version) => {
              const match = version.match(versionPattern);

              if (!match?.groups) {
                throw new Error(`Unsupported version format: ${version}`);
              }

              return {
                major: Number(match.groups.major),
                minor: Number(match.groups.minor),
                patch: Number(match.groups.patch),
                prerelease: match.groups.prerelease ?? '',
              };
            };

            const formatVersion = ({ major, minor, patch, prerelease }) =>
              `${major}.${minor}.${patch}${prerelease ? `-${prerelease}` : ''}`;

            const compareIdentifiers = (left, right) => {
              const leftNumeric = /^\d+$/.test(left);
              const rightNumeric = /^\d+$/.test(right);

              if (leftNumeric && rightNumeric) {
                return Number(left) - Number(right);
              }

              if (leftNumeric) {
                return -1;
              }

              if (rightNumeric) {
                return 1;
              }

              return left.localeCompare(right);
            };

            const compareVersions = (left, right) => {
              const keys = ['major', 'minor', 'patch'];

              for (const key of keys) {
                const diff = left[key] - right[key];

                if (diff !== 0) {
                  return diff;
                }
              }

              if (!left.prerelease && !right.prerelease) {
                return 0;
              }

              if (!left.prerelease) {
                return 1;
              }

              if (!right.prerelease) {
                return -1;
              }

              const leftSegments = left.prerelease.split('.');
              const rightSegments = right.prerelease.split('.');
              const maxLength = Math.max(leftSegments.length, rightSegments.length);

              for (let index = 0; index < maxLength; index += 1) {
                const leftSegment = leftSegments[index];
                const rightSegment = rightSegments[index];

                if (leftSegment === undefined) {
                  return -1;
                }

                if (rightSegment === undefined) {
                  return 1;
                }

                const diff = compareIdentifiers(leftSegment, rightSegment);

                if (diff !== 0) {
                  return diff;
                }
              }

              return 0;
            };

            const applyBump = (version, bump) => {
              const parsed = parseVersion(version);

              if (bump === 'major') {
                return formatVersion({
                  major: parsed.major + 1,
                  minor: 0,
                  patch: 0,
                  prerelease: '',
                });
              }

              if (bump === 'minor') {
                return formatVersion({
                  major: parsed.major,
                  minor: parsed.minor + 1,
                  patch: 0,
                  prerelease: '',
                });
              }

              return formatVersion({
                major: parsed.major,
                minor: parsed.minor,
                patch: parsed.patch + 1,
                prerelease: '',
              });
            };

            const toPrereleaseVersion = (version) => {
              const parsed = parseVersion(version);

              return `${formatVersion({
                major: parsed.major,
                minor: parsed.minor,
                patch: parsed.patch,
                prerelease: '',
              })}-0`;
            };

            const listTags = (pattern) =>
              execFileSync('git', ['tag', '--list', pattern], {
                encoding: 'utf8',
              })
                .trim()
                .split('\n')
                .filter(Boolean);

            const hasTag = (version) =>
              listTags(version).length > 0 || listTags(`v${version}`).length > 0;

            const listPublishedVersions = () => {
              try {
                const output = execFileSync(
                  'npm',
                  ['view', packageName, 'versions', '--json'],
                  { encoding: 'utf8' },
                ).trim();

                if (!output) {
                  return [];
                }

                const parsed = JSON.parse(output);

                if (Array.isArray(parsed)) {
                  return parsed;
                }

                return typeof parsed === 'string' ? [parsed] : [];
              } catch (error) {
                throw new Error(
                  `Failed to resolve published versions for ${packageName}: ${error.message}`,
                );
              }
            };

            const publishedVersions = listPublishedVersions();
            const publishedVersionSet = new Set(publishedVersions);
            const parsedPublishedVersions = publishedVersions.map(parseVersion);
            const stablePublishedVersions = parsedPublishedVersions.filter(
              (version) => !version.prerelease,
            );

            const hasPublishedVersion = (version) =>
              publishedVersionSet.has(version);

            const versionExists = (version) =>
              hasTag(version) || hasPublishedVersion(version);

            if (!['major', 'minor', 'patch'].includes(releaseSemverLabel)) {
              throw new Error(`Unsupported release semver label: ${releaseSemverLabel}`);
            }

            const packageVersion = parseVersion(rawVersion);
            const highestPublishedVersion =
              parsedPublishedVersions.length > 0
                ? parsedPublishedVersions.sort(compareVersions).at(-1)
                : packageVersion;
            const highestStableVersion =
              stablePublishedVersions.length > 0
                ? stablePublishedVersions.sort(compareVersions).at(-1)
                : packageVersion;

            if (!highestPublishedVersion || !highestStableVersion) {
              throw new Error('Failed to resolve a release baseline version.');
            }

            let candidateVersion;

            if (releaseMode === 'latest') {
              candidateVersion = applyBump(
                formatVersion(highestStableVersion),
                releaseSemverLabel,
              );
            } else {
              candidateVersion = toPrereleaseVersion(
                applyBump(formatVersion(highestPublishedVersion), releaseSemverLabel),
              );
            }

            while (versionExists(candidateVersion)) {
              if (releaseMode === 'latest') {
                core.info(
                  `Stable version ${candidateVersion} already exists in git tags or npm. Skipping release.`,
                );
                core.setOutput('skip_reason', 'stable-version-exists');
                core.setOutput('version', candidateVersion);
                core.setOutput('shipit_args', '');
                return;
              }

              core.info(
                `Prerelease version ${candidateVersion} already exists in git tags or npm. Advancing patch version.`,
              );
              candidateVersion = toPrereleaseVersion(
                applyBump(candidateVersion, 'patch'),
              );
            }

            const prereleaseFlag = releaseMode === 'next' ? '--prerelease' : '';

            core.info(`Resolved publish version ${candidateVersion} for ${releaseMode} release mode.`);
            core.setOutput('version', candidateVersion);
            core.setOutput('shipit_args', prereleaseFlag);

      - name: Create Release
        if: steps.release_mode.outputs.mode != 'skip' && steps.publish_version.outputs.skip_reason == ''
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npx auto shipit --use-version "${{ steps.publish_version.outputs.version }}" ${{ steps.publish_version.outputs.shipit_args }}

      - name: Skip Existing Stable Release
        if: steps.publish_version.outputs.skip_reason == 'stable-version-exists'
        run: echo "Stable version already exists. Skipping release."

      - name: Skip Release
        if: steps.release_mode.outputs.mode == 'skip'
        run: echo "No release will be created for this push."
